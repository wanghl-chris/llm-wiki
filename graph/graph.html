                formatter: '{b}',
                color: '#fff',
                fontSize: 12
            },
            draggable: true,
            lineStyle: {
                color: 'source',
                curveness: 0.3,
                width: 2,
                opacity: 0.6
            },
            emphasis: {
                focus: 'adjacency',
                lineStyle: { width: 5 }
            },
            categories: categories,
            data: graphData.nodes.map(function(node) {
                return {
                    id: node.id,
                    name: node.name,
                    category: node.type === 'page' ? 0 : 1,
                    value: node.size / 100,
                    symbolSize: Math.min(Math.max(node.size / 500, 25), 50),
                    nodeType: node.type,
                    sourceCategory: node.category,
                    keywords: node.keywords,
                    filePath: node.filePath
                };
            }),
            links: graphData.edges.map(function(edge) {
                return {
                    source: edge.source,
                    target: edge.target,
                    value: edge.value,
                    lineStyle: {
                        width: edge.value * 2
                    }
                };
            })
        }]
    };
    
    chart.setOption(option);
    window.addEventListener('resize', function() { chart.resize(); });
    
    // 添加点击事件 - 点击页面节点打开文档
    chart.on('click', function(params) {
        if (params.dataType === 'node') {
            var node = params.data;
            if (node.nodeType === 'page' && node.filePath) {
                // 使用 file:// 协议打开本地文件
                window.open('file://' + node.filePath, '_blank');
            }
        }
    });
    </script>
</body>
</html>
